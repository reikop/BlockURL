<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1 data-i18n="extName">BlockURL</h1>
    <label class="switch">
      <input type="checkbox" id="global-toggle" />
      <span class="slider"></span>
    </label>
  </header>

  <section id="current-site" hidden>
    <div class="domain-row">
      <span id="current-domain"></span>
      <button id="block-current" data-i18n="blockThisSite">이 사이트 차단</button>
    </div>
  </section>

  <section class="editor-wrap">
    <textarea
      id="editor"
      rows="10"
      spellcheck="false"
      data-i18n-placeholder="editorPlaceholder"
      placeholder="example.com&#10;*ads*&#10;# tracker.com  ← 꺼진 필터"
    ></textarea>
    <p id="invalid" class="error" hidden></p>
  </section>

  <footer>
    <span id="status" class="status"></span>
    <a href="#" id="open-options" data-i18n="manageFilters">필터 관리</a>
    <button id="save" data-i18n="save">저장</button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
